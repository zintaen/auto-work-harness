name: ci
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo and runs tests — never writes.
permissions:
  contents: read

# Don't burn runners on superseded pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions pinned to a full commit SHA (not a mutable tag) — supply-chain hygiene.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"

      # Stage 0/1/2/3 unit + property + mutation + worktree suites.
      # `python -m ruff` (not bare `ruff`) so it works regardless of console-script PATH.
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Tests (incl. Hypothesis PBT + real-repo worktree tests)
        run: python -m pytest -q

      # Stage 1 — golden-set eval gate on the harness's OWN self-eval set. Block the
      # PR on regression vs the committed baseline (regression, not absolute threshold
      # — the KTH discipline). Regenerate the baseline with:
      #   awh eval goldenset/self.yaml --seeds 3 --out eval-baseline.json
      - name: Eval gate (block on regression)
        run: |
          python -m harness.cli eval goldenset/self.yaml \
            --seeds 3 --baseline eval-baseline.json --max-regression 0.0

      # Stage 2 — prove the mutation tester (and the demo suite) are healthy.
      - name: Mutation demo (suite must kill 100% of mutants)
        run: python scripts/mutation_demo.py
