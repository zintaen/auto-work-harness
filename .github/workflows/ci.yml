name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"

      # Stage 0/1/2/3 unit + property + mutation + worktree suites.
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (incl. Hypothesis PBT + real-repo worktree tests)
        run: python -m pytest -q

      # Stage 1 — golden-set eval gate. Block the PR on regression vs the committed
      # baseline (regression, not absolute threshold — the KTH discipline).
      - name: Eval gate (block on regression)
        run: |
          if [ -f eval-baseline.json ]; then
            python -m harness.cli eval harness/goldenset/tasks/example_tasks.yaml \
              --seeds 8 --baseline eval-baseline.json --max-regression 0.05
          else
            echo "No eval-baseline.json yet; recording current scores is a manual step."
            python -m harness.cli eval harness/goldenset/tasks/example_tasks.yaml --seeds 8
          fi

      # Stage 2 — prove the mutation tester (and the demo suite) are healthy.
      - name: Mutation demo (suite must kill 100% of mutants)
        run: python scripts/mutation_demo.py
