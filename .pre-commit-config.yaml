# Stage 0 principle applied to commits: run the same checks locally that CI runs,
# deterministically, on every change (pre-commit/CI/git hooks generalize the hook gate).
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff (format check)
        entry: ruff format --check
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest (fast suite)
        entry: python3 -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
